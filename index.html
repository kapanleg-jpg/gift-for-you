<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สำหรับเธอ 💖</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}

/* 🎁 กล่อง */
.box {
  width: 120px;
  height: 120px;
  background: red;
  margin: 200px auto;
  position: relative;
  cursor: pointer;
  animation: float 2s infinite;
}

.lid {
  width: 120px;
  height: 30px;
  background: #ff4d4d;
  position: absolute;
  top: -30px;
  transition: 0.5s;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0); }
}

/* ✨ แสง */
.light {
  position: absolute;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, pink, transparent);
  top: -50px;
  left: -40px;
  opacity: 0;
  transition: 0.5s;
}

/* ❤️ หัวใจ */
.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: rise 3s linear forwards;
}

@keyframes rise {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-200px); opacity: 0; }
}

/* 💬 ข้อความ */
#message {
  display: none;
  font-size: 24px;
  margin-top: 50px;
  white-space: pre-line;
}

/* 👉 ปุ่ม */
#btn {
  display: none;
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  background: pink;
  border-radius: 10px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="box" id="box">
  <div class="lid" id="lid"></div>
  <div class="light" id="light"></div>
</div>

<button id="btn">กดดู 💖</button>
<div id="message"></div>

<audio id="music" src="love.mp3"></audio>

<script>

const box = document.getElementById("box");
const lid = document.getElementById("lid");
const light = document.getElementById("light");
const btn = document.getElementById("btn");
const msg = document.getElementById("message");
const music = document.getElementById("music");

const text = [
  "อะโหลล",
  "แกยังอยากคุยกับเราอยู่มั้ย",
  "เราขอโทษนะ ที่วันนั่นเราพิมไม่ดีใส่เเก 😓",
  "มันอาจจะเป็นเพราะว่าเราคิดมาก",
  "เลยทำให้พิมสิ่งที่ไม่ควรพิมใส่เเกไป",
  "เเกยัง.... ไม่ได้เริ่มต้นใหม่ไปเเล้วใช่มั้ย",
  "ให้โอกาสเราหน่อยได้หรือป่าว 👉👈",
  "เราอยากให้เรากับเเก ไปกันต่อได้นานกว่านี้",
  "ขอโทษที่เงียบเเละไม่ได้ตอบอะไรกลับไปเลย",
  "ดีกันนะ โอ๋เอ๋ เราเห็นเเกสำคัญมากๆ",
  "เราอยากให้เเกได้รู้ ว่าการเป็นคนพิเศษมันดีเเค่ไหน",
  "เลยตั้งใจเขียนข้อความพวกนี้มาหาแก",
  "หวังว่าจะเปิดโอกาสให้กันอีกครั้ง เรารอเเกตอบกลับมานะะ"
];

box.onclick = () => {
  lid.style.transform = "rotate(-40deg) translateY(-20px)";
  light.style.opacity = "1";

  for(let i=0;i<15;i++){
    createHeart();
  }

  setTimeout(()=>{
    box.style.display = "none";
    btn.style.display = "inline-block";
  },1000);
};

btn.onclick = () => {
  btn.style.display = "none";
  msg.style.display = "block";
  music.play();

  let i = 0;
  function show(){
    if(i < text.length){
      msg.innerHTML += text[i] + "\n";
      i++;
      setTimeout(show,2000);
    }
  }
  show();
};

function createHeart(){
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100 + "vw";
  h.style.top = "60vh";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),3000);
}

</script>

</body>
</html>
