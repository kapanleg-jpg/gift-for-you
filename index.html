<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
  text-align:center;
}

/* 🎁 กล่อง */
.box {
  width:140px;
  height:140px;
  background:linear-gradient(145deg,#ff3b3b,#a80000);
  margin:200px auto;
  position:relative;
  border-radius:12px;
  cursor:pointer;
  animation:shake 1.5s infinite ease-in-out;
}

/* ฝา */
.lid {
  width:140px;
  height:35px;
  background:#ff5a5a;
  position:absolute;
  top:-35px;
  border-radius:12px 12px 0 0;
  transform-origin:left bottom;
  transition:0.7s cubic-bezier(.2,1,.3,1);
}

/* ✨ แสง */
.flash {
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle,rgba(255,100,150,0.8),transparent);
  top:-80px;
  left:-80px;
  opacity:0;
  transform:scale(0.5);
  transition:0.5s;
}

/* animation */
@keyframes shake {
  0%,100% { transform:translateX(0) }
  25% { transform:translateX(-5px) }
  50% { transform:translateX(5px) }
  75% { transform:translateX(-5px) }
}

/* ❤️ */
.heart {
  position:absolute;
  font-size:20px;
  animation:fly 3s linear forwards;
}

@keyframes fly {
  from { transform:translateY(0) scale(1); opacity:1 }
  to { transform:translateY(-300px) scale(1.6); opacity:0 }
}

/* 💬 */
#text {
  opacity:0;
  transition:1.5s;
  font-size:28px;
  margin-top:50px;
  white-space:pre-line;
}

/* ปุ่ม */
#next {
  display:none;
  padding:12px 30px;
  border:none;
  border-radius:25px;
  background:pink;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 20px pink;
}
</style>
</head>

<body>

<div class="box" id="box">
  <div class="lid" id="lid"></div>
  <div class="flash" id="flash"></div>
</div>

<button id="next">กดต่อ 💖</button>
<div id="text"></div>

<audio id="music" src="love.mp3"></audio>

<script>
const box = document.getElementById("box");
const lid = document.getElementById("lid");
const flash = document.getElementById("flash");
const next = document.getElementById("next");
const text = document.getElementById("text");
const music = document.getElementById("music");

const msg = [
"มีบางอย่างอยากบอก...",
"ทุกช่วงเวลาที่มีเธอ มันดีมากจริงๆ",
"เราขอโทษนะที่เคยทำให้เสียใจ",
"เรายังรักเธอเสมอ ❤️"
];

box.onclick = () => {
  lid.style.transform = "rotate(-70deg)";
  flash.style.opacity = "1";
  flash.style.transform = "scale(1.3)";

  for(let i=0;i<30;i++) heart();

  setTimeout(()=>{
    box.style.opacity="0";
    box.style.transform="scale(0.5)";
  },500);

  setTimeout(()=>{
    box.style.display="none";
    next.style.display="inline-block";
  },1200);
};

next.onclick = () => {
  next.style.display="none";
  text.style.opacity="1";
  music.play();

  let i=0;
  function show(){
    if(i < msg.length){
      text.innerHTML += msg[i] + "\\n";
      i++;
      setTimeout(show,2200);
    }
  }
  show();
};

function heart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.top="60vh";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),3000);
}
</script>

</body>
</html>
