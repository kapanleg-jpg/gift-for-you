
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #1a1a1a, #000);
  overflow: hidden;
  font-family: sans-serif;
  color: white;
  text-align: center;
}

/* 🎁 กล่อง */
.box {
  width: 130px;
  height: 130px;
  background: linear-gradient(145deg, #ff3b3b, #cc0000);
  margin: 200px auto;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(255,0,0,0.4);
  animation: float 2s infinite ease-in-out;
}

.lid {
  width: 130px;
  height: 35px;
  background: linear-gradient(145deg, #ff6666, #ff1a1a);
  position: absolute;
  top: -35px;
  left: 0;
  border-radius: 10px 10px 0 0;
  transform-origin: left bottom;
  transition: 0.6s cubic-bezier(.68,-0.55,.27,1.55);
}

/* ✨ แสง */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  top: -80px;
  left: -80px;
  background: radial-gradient(circle, rgba(255,100,150,0.6), transparent);
  opacity: 0;
  transition: 0.5s;
}

/* ❤️ หัวใจ */
.heart {
  position: absolute;
  font-size: 20px;
  animation: fly 3s linear forwards;
}

@keyframes fly {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
}

/* 💬 ข้อความ */
#msg {
  opacity: 0;
  transition: 1s;
  margin-top: 50px;
  font-size: 26px;
  white-space: pre-line;
}

/* ปุ่ม */
#btn {
  display: none;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, pink, hotpink);
  cursor: pointer;
  box-shadow: 0 0 15px pink;
}
</style>
</head>

<body>

<div class="box" id="box">
  <div class="lid" id="lid"></div>
  <div class="glow" id="glow"></div>
</div>

<button id="btn">เปิดดู 💖</button>
<div id="msg"></div>

<audio id="music" src="love.mp3"></audio>

<script>
const box = document.getElementById("box");
const lid = document.getElementById("lid");
const glow = document.getElementById("glow");
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const music = document.getElementById("music");

const text = [
"เรามีอะไรอยากบอก...",
"ทุกช่วงเวลาที่มีเธอ มันมีค่ามากจริงๆ",
"ถึงเราจะเคยทำพลาดไปบ้าง",
"แต่เรารักเธอมากนะ 💖"
];

box.onclick = () => {
  lid.style.transform = "rotate(-60deg)";
  glow.style.opacity = "1";

  for(let i=0;i<25;i++){
    heart();
  }

  setTimeout(()=>{
    box.style.display = "none";
    btn.style.display = "inline-block";
  },1200);
};

btn.onclick = () => {
  btn.style.display = "none";
  msg.style.opacity = "1";
  music.play();

  let i=0;
  function show(){
    if(i < text.length){
      msg.innerHTML += text[i] + "\n";
      i++;
      setTimeout(show,2000);
    }
  }
  show();
};

function heart(){
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100 + "vw";
  h.style.top = "60vh";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),3000);
}
</script>

</body>
</html>
